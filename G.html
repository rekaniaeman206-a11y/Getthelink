<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التحميل الآمنة - تجربة الإعلانات</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3940256099942544" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .ad-container {
            width: 100%;
            min-height: 250px;
            background: #2d2d2d;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #4ea8de;
            border-radius: 10px;
            overflow: hidden;
        }
        .btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* مخفي وسيظهر بعد انتهاء العداد */
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background-color: #26af5f;
        }
        .timer {
            font-size: 18px;
            color: #ffa500;
            font-weight: bold;
        }
        .checkmark {
            color: #2ed573;
            font-size: 40px;
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>جاري تجهيز رابط اللعبة...</h2>
    
    <div class="ad-container">
        <span style="font-size: 11px; color: #888; margin-bottom: 5px;">إعلان تجريبي متصل بـ AdMob</span>
        
        <ins class="adsbygoogle"
             style="display:block; width:300px; height:250px"
             data-ad-client="ca-pub-3940256099942544"
             data-ad-slot="6300978111"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <div id="countdown" class="timer">يرجى الانتظار: <span id="seconds">5</span> ثوانٍ...</div>
    <div id="check" class="checkmark">✓</div>

    <a href="https://itch.io" id="download-btn" class="btn">اضغط هنا للدخول للعبة</a>
</div>

<script>
    var timeLeft = 5; // عدد ثواني الانتظار (يمكنك زيادتها لو أحببت)
    var timerElement = document.getElementById('countdown');
    var secondsElement = document.getElementById('seconds');
    var checkElement = document.getElementById('check');
    var buttonElement = document.getElementById('download-btn');

    var downloadTimer = setInterval(function(){
        timeLeft--;
        secondsElement.textContent = timeLeft;
        
        if(timeLeft <= 0){
            clearInterval(downloadTimer);
            timerElement.style.display = 'none'; 
            checkElement.style.display = 'block'; 
            buttonElement.style.display = 'inline-block'; 
        }
    }, 1000);
</script>

</body>
</html>
