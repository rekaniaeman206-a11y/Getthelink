<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التحميل الآمنة</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .loading-holder {
            margin: 30px 0;
        }
        .btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* مخفي وسيظهر بعد انتهاء العداد */
            text-decoration: none;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:hover {
            background-color: #26af5f;
            transform: scale(1.05);
        }
        .timer {
            font-size: 20px;
            color: #ffa500;
            font-weight: bold;
        }
        .checkmark {
            color: #2ed573;
            font-size: 50px;
            display: none;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>جاري فحص وتجهيز الرابط الحصري...</h2>
    
    <div class="loading-holder">
        <div id="countdown" class="timer">يرجى الانتظار: <span id="seconds">5</span> ثوانٍ...</div>
        <div id="check" class="checkmark">✓</div>
    </div>

    <a href="https://www.effectivecpmnetwork.com/ybb0qmae1w?key=533cf0d827a1c2debb099bb5aec916e4" target="_blank" id="download-btn" class="btn">اضغط هنا للانتقال للرابط</a>
</div>

<script>
    var timeLeft = 5; // عدد ثواني الانتظار
    var timerElement = document.getElementById('countdown');
    var secondsElement = document.getElementById('seconds');
    var checkElement = document.getElementById('check');
    var buttonElement = document.getElementById('download-btn');

    var downloadTimer = setInterval(function(){
        timeLeft--;
        secondsElement.textContent = timeLeft;
        
        if(timeLeft <= 0){
            clearInterval(downloadTimer);
            timerElement.style.display = 'none'; 
            checkElement.style.display = 'block'; 
            buttonElement.style.display = 'inline-block'; 
        }
    }, 1000);
</script>

</body>
</html>
